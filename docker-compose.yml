services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/magicdashboard?schema=public
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - magic_configs:/app/configs
      - magic_wallpapers:/app/wallpapers
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: magicdashboard
    ports:
      - "5432:5432"
    volumes:
      - magic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  magic_configs:
  magic_wallpapers:
  magic_pgdata:
